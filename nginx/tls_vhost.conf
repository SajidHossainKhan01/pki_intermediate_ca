# =============================================================================
# Nginx TLS VirtualHost Configuration
# CSE PKI — University of Dhaka
#
# Deployment notes:
#   1. Place server.cert.pem and server.key.pem in /etc/ssl/iot-cse/
#   2. Place intermediate.cert.pem (NOT root CA) in /etc/ssl/iot-cse/
#   3. Test config: nginx -t
#   4. Reload:      systemctl reload nginx
# =============================================================================

server {
    listen 80;
    server_name iot-cse.du.ac.bd www.iot-cse.du.ac.bd;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iot-cse.du.ac.bd www.iot-cse.du.ac.bd;

    # ── Certificate Files ──────────────────────────────────────────────────
    # Server certificate only (NOT the chain/root here)
    ssl_certificate     /etc/ssl/iot-cse/server.cert.pem;
    ssl_certificate_key /etc/ssl/iot-cse/server.key.pem;

    # Intermediate CA cert for OCSP stapling (NOT Root CA)
    # Root CA cert must NOT be deployed on the server.
    ssl_trusted_certificate /etc/ssl/iot-cse/intermediate.cert.pem;

    # ── Protocol & Cipher Hardening ────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;  # TLS 1.3 handles this; 'off' is modern best practice

    # ── Session & Performance ──────────────────────────────────────────────
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── OCSP Stapling ──────────────────────────────────────────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security Headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "no-referrer-when-downgrade"          always;

    # ── mTLS Client Authentication (optional — enable for API endpoints) ───
    # Uncomment to require client certificates:
    # ssl_client_certificate /etc/ssl/iot-cse/ca-chain.cert.pem;
    # ssl_verify_client      on;
    # ssl_verify_depth       2;

    # ── Application Proxy ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Forward client cert info to backend (if mTLS enabled)
        proxy_set_header   X-SSL-Client-CN   $ssl_client_s_dn_cn;
        proxy_set_header   X-SSL-Client-Verify $ssl_client_verify;
    }
}

