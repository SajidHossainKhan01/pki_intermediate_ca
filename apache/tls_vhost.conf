# =============================================================================
# Apache TLS VirtualHost Configuration
# CSE PKI — University of Dhaka
#
# Enable required modules:
#   a2enmod ssl headers rewrite proxy proxy_http
#   systemctl restart apache2
# =============================================================================

# HTTP → HTTPS redirect
<VirtualHost *:80>
    ServerName  iot-cse.du.ac.bd
    ServerAlias www.iot-cse.du.ac.bd

    RewriteEngine On
    RewriteCond   %{HTTPS} off
    RewriteRule   ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName  iot-cse.du.ac.bd
    ServerAlias www.iot-cse.du.ac.bd

    # ── TLS Engine ────────────────────────────────────────────────────────
    SSLEngine on

    # Server certificate (NOT chain/root)
    SSLCertificateFile    /etc/ssl/iot-cse/server.cert.pem
    SSLCertificateKeyFile /etc/ssl/iot-cse/server.key.pem

    # Intermediate CA chain (NOT Root CA — must not be on server)
    SSLCertificateChainFile /etc/ssl/iot-cse/intermediate.cert.pem

    # ── Protocol & Cipher Hardening ───────────────────────────────────────
    # Disable SSLv3, TLS 1.0, TLS 1.1 — allow only TLS 1.2 and 1.3
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1

    SSLCipherSuite      ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:\
ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:\
ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    SSLHonorCipherOrder off
    SSLCompression      off
    SSLSessionTickets   off

    # ── OCSP Stapling ─────────────────────────────────────────────────────
    SSLUseStapling         on
    SSLStaplingCache       "shmcb:/run/apache2/stapling_cache(512000)"
    SSLStaplingResponderTimeout 5
    SSLStaplingReturnResponderErrors off

    # ── mTLS Client Certificate Auth (optional) ───────────────────────────
    # Uncomment to enforce mutual TLS for all or specific paths:
    # SSLCACertificateFile /etc/ssl/iot-cse/ca-chain.cert.pem
    # SSLVerifyClient      require
    # SSLVerifyDepth       2
    #
    # Path-level mTLS:
    # <Location /api/devices>
    #     SSLVerifyClient require
    #     SSLVerifyDepth  2
    # </Location>

    # ── Security Headers ──────────────────────────────────────────────────
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Frame-Options           "DENY"
    Header always set X-Content-Type-Options    "nosniff"
    Header always set X-XSS-Protection          "1; mode=block"
    Header always set Referrer-Policy           "no-referrer-when-downgrade"

    # ── Application Proxy ─────────────────────────────────────────────────
    ProxyPreserveHost On
    ProxyPass         / http://127.0.0.1:8000/
    ProxyPassReverse  / http://127.0.0.1:8000/

    # Forward client cert DN to backend (if mTLS enabled)
    RequestHeader set X-SSL-Client-CN   "%{SSL_CLIENT_S_DN_CN}s"
    RequestHeader set X-SSL-Client-Cert "%{SSL_CLIENT_CERT}s"

    # ── Logging ───────────────────────────────────────────────────────────
    ErrorLog  /var/log/apache2/iot-cse-error.log
    CustomLog /var/log/apache2/iot-cse-access.log combined

</VirtualHost>
